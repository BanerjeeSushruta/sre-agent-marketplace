validation_rules:
  pdf_exists: required
  pdf_non_empty: required
  page_count_greater_than_zero: required
  first_page_matches_template: required
  last_page_matches_template: required
  toc_exists: required
  toc_links_working: required
  proper_indentation_applied: required
  no_overlapping_content: required
  no_text_clipping: required
  no_table_clipping: required
  no_image_clipping: required
  render_validation_successful: required
  table_structure_consistent: required
  table_header_row_alignment: required
  table_cell_count_normalized: required
  no_cell_content_visual_bleed: required
  no_table_column_overflow: required
  no_table_row_overflow: required
  table_fitment_predictive_validation: required
  no_unbreakable_token_overflow: required
  no_word_break_enforced: required
  wide_table_column_chunking: required
  template_usage_valid: required
  first_page_template_preserved: required
  last_page_template_preserved: required
  first_page_overlay_content_present: required
  last_page_overlay_content_present: required
  template_page_size_preserved: required
  png_background_usage_valid: required
  first_page_png_background_preserved: required
  last_page_png_background_preserved: required
  first_page_png_overlay_content_present: required
  last_page_png_overlay_content_present: required
  middle_pages_free_flowing: required
fail_conditions:
  - missing_template_file
  - first_page_template_not_applied
  - last_page_template_not_applied
  - toc_generation_failed
  - toc_links_invalid
  - overlapping_content_detected
  - clipped_content_detected
  - table_overflow_detected
  - image_overflow_detected
  - sensitive_data_detected_without_redaction
  - table_header_row_mismatch
  - duplicate_table_headers
  - empty_table_headers
  - table_cell_visual_bleed
  - table_column_overflow
  - table_row_overflow
  - template_usage_validation_failed
  - template_first_page_not_preserved
  - template_last_page_not_preserved
  - missing_first_page_overlay_content
  - missing_last_page_overlay_content
  - png_background_usage_validation_failed
  - first_page_png_background_not_preserved
  - last_page_png_background_not_preserved
  - missing_first_page_png_overlay_content
  - missing_last_page_png_overlay_content
  - middle_pages_not_free_flowing
